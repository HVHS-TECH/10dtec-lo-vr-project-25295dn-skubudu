<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
<script>
const cloud = document.querySelector('#cloud1');

function startCloud() {
  cloud.setAttribute('visible', true);
  cloud.components.animation__move.play();
}

cloud.addEventListener('animationcomplete__move', () => {
  cloud.setAttribute('visible', false);
  cloud.setAttribute('position', { x: -10, y: 5, z: -5 });

  setTimeout(() => {
    startCloud();
  }, 500);
});

startCloud();
</script>
  </head>
    <body>
    <a-scene renderer="shadowMap: true">
      <a-sky color="#ffcc99"></a-sky>
      <a-light type="ambient" intensity="0.2" color="#ffccaa"></a-light>
      <a-light 
  type="directional"
  position="-10 3 5"
  color="#ff944d"
  intensity="0.8"
  light="castShadow: true; shadowCameraTop: 10; shadowCameraBottom: -10; shadowCameraLeft: -10; shadowCameraRight: 10; shadowCameraFar: 50">
</a-light>
      ></a-light>
      <a-plane 
  position="0 0 0" 
  rotation="-90 0 0" 
  color="#4fb3bf"
  scale="30 30 30"
  shadow="receive: true">
</a-plane>
      <a-entity
  id="cloud1"
  ply-model="src:cloud.ply"
  position="-10 10 -5"
  rotation="-270 0 0"
  scale="0.7 0.7 0.7"
  material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: -10 10 -5;
                   to: 10 10 -5;
                   dur: 10000;
                   loop: true;
                   easing: linear"
    ></a-entity>
          
      <a-entity 
      ply-model="src:cloud.ply"
      position="0.8 5 1.3"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      shadow="cast: true"
        material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: 0.8 5 1.3;
                   to: 5 5 1.3;
                   dur: 10000;
                   loop: true;
                   easing: linear"
      ></a-entity>
      
      <a-entity
      ply-model="src:cloud.ply"
      position="6 6 5"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      shadow="cast: true"
        material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: 6 5 5;
                   to: 10 5 5;
                   dur: 10000;
                   loop: true;
                   easing: linear"
      ></a-entity>

      <a-entity
      ply-model="src:cloud.ply"
      position="6 5.8 -3.4"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      shadow="cast: true"
        material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: 6 5.8 -3.4;
                   to: 10 5.8 -3.4;
                   dur: 10000;
                   loop: true;
                   easing: linear"
      ></a-entity>

      <a-entity
      ply-model="src:sun.ply"
      position="-4 11 5"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      shadow="cast: true"
      ></a-entity>

      <a-entity
      ply-model="src:island.ply"
      position="2.6 -0.45 0.646"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      ></a-entity>

      <a-entity
  id="fish"
  ply-model="src:fish.ply"
  position="-2.370 -0.170 0.5"
  rotation="-90 0 180"
  scale="0.5 0.5 0.5"
  material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: -2.370 -0.170 -0.5;
                   to: 7.5 -0.170 -0.5;
                   dur: 8000;
                   loop: true;
                   easing: linear"
  ></a-entity>

  <a-entity
  id="fish"
  ply-model="src:fish.ply"
  position="5.1 -0.170 -4"
  rotation="-90 -90 180"
  scale="0.5 0.5 0.5"
  material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: 5.1 -0.170 -4;
                   to: 5.1 -0.170 6;
                   dur: 6000;
                   loop: true;
                   easing: linear"
  ></a-entity>

  <a-entity
  id="fish"
  ply-model="src:fish.ply"
  position="4 -0.170 6"
  rotation="-90 -90 180"
  scale="0.5 0.5 0.5"
  material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: 4 -0.170 6;
                   to: 5 -0.170 -5;
                   dur: 9000;
                   loop: true;
                   easing: linear"
  ></a-entity>

  <a-entity
  id="fish"
  ply-model="src:fish.ply"
  position="8 -0.170 2"
  rotation="-90 -90 180"
  scale="0.5 0.5 0.5"
  material="transparent: true; opacity: 1"
  animation__move="property: position;
                   from: 8 -0.170 2;
                   to: 5 -0.170 -5;
                   dur: 5000;
                   loop: true;
                   easing: linear"
  ></a-entity>
  
      
    </a-scene>
  </body>
</html>
