<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>

  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
      <a-light id="amb" type="ambient" intensity="0.5" ></a-light>
      <a-light id="dir" type="directional" position="0.5 2 0.5" color="white" light="castShadow: true"></a-light>

      <a-entity 
      ply-model="src:cloud.ply"
      position="-1 7 -1"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      shadow="cast: true"
      ></a-entity>
          
      <a-entity 
      ply-model="src:cloud.ply"
      position="6 6 5"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      ></a-entity>
      
      <a-entity
      ply-model="src:cloud.ply"
      position="3 8 -4"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      ></a-entity>

      <a-entity
      ply-model="src:cloud.ply"
      position="3 8 -4"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      ></a-entity>

      <a-entity
      ply-model="src:sun.ply"
      position="-4 11 5"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      ></a-entity>

      <a-entity
      ply-model="src:island.ply"
      position="2 0 -2"
      rotation="-90 0 90"
      scale="0.7 0.7 0.7"
      ></a-entity>

  
      
    </a-scene>
  </body>
</html>
